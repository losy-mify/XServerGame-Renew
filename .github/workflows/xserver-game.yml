name: 🎮 XServer GAME 自动续期

on:
  schedule:
    # 每天北京时间 08:00 运行（UTC 00:00）
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  renew:
    name: 🔄 执行续期
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 拉取私库脚本
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/XServerGame-Renew-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本到工作目录
        run: mv private/renew.py renew.py

      - name: 🟢 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 安装依赖
        run: npm install

      - name: 🌐 安装 Playwright 浏览器
        run: npx playwright install chromium --with-deps

      - name: 🛡️ 启动 GOST 代理转发
        if: ${{ env.GOST_PROXY != '' }}
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 3
          echo "✅ GOST 已启动，测试连通性..."
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org | sed 's/\.[0-9]*$/.**/' && echo

      - name: 🚀 运行续期脚本
        env:
          XSERVER_ACCOUNT: ${{ secrets.XSERVER_ACCOUNT }}
          TG_BOT:          ${{ secrets.TG_BOT }}
          GOST_PROXY:      ${{ secrets.GOST_PROXY && 'http://127.0.0.1:8080' || '' }}
        run: npx playwright test

      - name: 📸 上传失败截图
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: test-results/
          retention-days: 7

      - name: 📝 提交 README 更新
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Auto update README [skip ci]'
          file_pattern: README.md
